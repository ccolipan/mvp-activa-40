{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Bienvenido</h2>
            <p class="text-gray-500 mt-2">Ingresa a tu cuenta de Activa+40</p>
        </div>

        <form method="POST" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nombre de Usuario</label>
                <input type="text" name="username" id="username" required 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-activa-blue focus:border-activa-blue outline-none transition">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" name="password" id="password" required 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-activa-blue focus:border-activa-blue outline-none transition">
            </div>

            <button type="submit" class="w-full bg-activa-blue text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-800 transition duration-300 shadow-md">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            ¿No tienes cuenta? <a href="#" class="text-activa-accent font-semibold hover:underline">Regístrate aquí</a>
        </div>
    </div>
</div>
{% endblock %}
