<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa+40 | Entrenamiento Seguro</title>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'activa-blue': '#1E40AF', // Azul oscuro elegante
                        'activa-accent': '#10B981', // Verde esmeralda para el éxito/salud
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

<nav class="bg-activa-blue text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <a href="{% url 'inicio' %}" class="flex items-center gap-2 hover:opacity-80 transition">
                        <svg class="w-8 h-8 text-activa-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span class="font-bold text-xl tracking-tight">Activa+40</span>
                    </a>
                </div>
                
                <div class="flex items-center gap-4">
                    {% if user.is_authenticated %}
                        <span class="text-sm text-gray-200">
                            Hola, <strong>{{ user.username }}</strong>
                        </span>
                        
                        <form method="POST" action="{% url 'logout' %}" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-sm bg-red-500 hover:bg-red-600 px-4 py-2 rounded-md font-semibold transition shadow-sm">
                                Cerrar Sesión
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-sm font-semibold hover:text-activa-accent transition">
                            Iniciar Sesión
                        </a>
                        <a href="#" class="text-sm bg-activa-accent hover:bg-green-500 text-white px-4 py-2 rounded-md font-semibold transition shadow-sm">
                            Registrarse
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
            &copy; 2026 Ecosistema Activa+40.
        </div>
    </footer>

</body>
</html>
