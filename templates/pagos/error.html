{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto py-20 text-center px-4">

        <h2 class="text-3xl font-bold text-red-800 mb-4">Problema con el Pago</h2>
        <p class="text-red-600 text-lg mb-8">{{ mensaje }}</p>
        
        <a href="{% url 'pagos:resumen' %}" class="inline-block bg-gray-900 text-white font-bold py-3 px-8 rounded-xl hover:bg-black transition shadow-md">
            Volver a intentar
        </a>
    </div>
</div>
{% endblock %}
